name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/Wrkzg.Frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: src/Wrkzg.Frontend
        run: npm ci

      - name: TypeScript Check
        working-directory: src/Wrkzg.Frontend
        run: npx tsc --noEmit

      - name: Build Frontend
        working-directory: src/Wrkzg.Frontend
        run: npm run build

      - name: Restore .NET
        run: dotnet restore wrkzg.sln

      - name: Build .NET
        run: dotnet build wrkzg.sln --no-restore -c Release

      - name: Run Tests
        run: dotnet test wrkzg.sln --no-build -c Release --verbosity normal
