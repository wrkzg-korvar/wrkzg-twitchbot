name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ─── Windows x64 ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Frontend
        working-directory: src/Wrkzg.Frontend
        run: |
          npm ci
          npm run build

      - name: Publish Windows x64
        run: |
          dotnet publish src/Wrkzg.Host/Wrkzg.Host.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish/win-x64

      - name: Clean publish output
        run: |
          cd publish/win-x64
          Remove-Item -Force *.xml -ErrorAction SilentlyContinue
          Remove-Item -Force *.pdb -ErrorAction SilentlyContinue
          Remove-Item -Force web.config -ErrorAction SilentlyContinue
          Remove-Item -Force launchSettings.json -ErrorAction SilentlyContinue
          Remove-Item -Force appsettings.Development.json -ErrorAction SilentlyContinue
          Remove-Item -Force Wrkzg.staticwebassets.endpoints.json -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force BuildHost-net472 -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force BuildHost-netcore -ErrorAction SilentlyContinue

      - name: Create ZIP
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath Wrkzg-${{ github.ref_name }}-win-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: Wrkzg-${{ github.ref_name }}-win-x64.zip

  # ─── macOS ARM64 (Apple Silicon) ─────────────────────────
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Frontend
        working-directory: src/Wrkzg.Frontend
        run: |
          npm ci
          npm run build

      - name: Publish macOS ARM64
        run: |
          dotnet publish src/Wrkzg.Host/Wrkzg.Host.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/osx-arm64

      - name: Clean publish output
        run: |
          cd publish/osx-arm64
          rm -f *.xml *.pdb web.config launchSettings.json appsettings.Development.json Wrkzg.staticwebassets.endpoints.json
          rm -rf BuildHost-net472 BuildHost-netcore

      - name: Generate icns from PNG
        run: |
          if [ -f src/Wrkzg.Host/Assets/icon.png ]; then
            mkdir -p icon.iconset
            sips -z 16 16     src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_16x16.png
            sips -z 32 32     src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_16x16@2x.png
            sips -z 32 32     src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_32x32.png
            sips -z 64 64     src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_32x32@2x.png
            sips -z 128 128   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_128x128.png
            sips -z 256 256   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_128x128@2x.png
            sips -z 256 256   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_256x256.png
            sips -z 512 512   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_256x256@2x.png
            sips -z 512 512   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_512x512.png
            sips -z 1024 1024 src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_512x512@2x.png
            iconutil -c icns icon.iconset -o icon.icns
            rm -rf icon.iconset
          fi

      - name: Create .app Bundle
        run: |
          APP_NAME="Wrkzg.app"
          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"

          # Copy all publish output into MacOS/
          cp -R publish/osx-arm64/* "$APP_NAME/Contents/MacOS/"

          # Copy Info.plist
          cp src/Wrkzg.Host/macOS/Info.plist "$APP_NAME/Contents/"

          # Copy icon (icns format)
          if [ -f icon.icns ]; then
            cp icon.icns "$APP_NAME/Contents/Resources/icon.icns"
          fi

          # Make binary executable
          chmod +x "$APP_NAME/Contents/MacOS/Wrkzg"

          # Ad-hoc code sign (no Apple Developer account needed)
          codesign --force --deep --sign - "$APP_NAME"

          # Create ZIP preserving the .app structure
          zip -r -y Wrkzg-${{ github.ref_name }}-osx-arm64.zip "$APP_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: osx-arm64
          path: Wrkzg-${{ github.ref_name }}-osx-arm64.zip

  # ─── macOS x64 (Intel) ──────────────────────────────────
  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Frontend
        working-directory: src/Wrkzg.Frontend
        run: |
          npm ci
          npm run build

      - name: Publish macOS x64
        run: |
          dotnet publish src/Wrkzg.Host/Wrkzg.Host.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/osx-x64

      - name: Clean publish output
        run: |
          cd publish/osx-x64
          rm -f *.xml *.pdb web.config launchSettings.json appsettings.Development.json Wrkzg.staticwebassets.endpoints.json
          rm -rf BuildHost-net472 BuildHost-netcore

      - name: Generate icns from PNG
        run: |
          if [ -f src/Wrkzg.Host/Assets/icon.png ]; then
            mkdir -p icon.iconset
            sips -z 16 16     src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_16x16.png
            sips -z 32 32     src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_16x16@2x.png
            sips -z 32 32     src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_32x32.png
            sips -z 64 64     src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_32x32@2x.png
            sips -z 128 128   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_128x128.png
            sips -z 256 256   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_128x128@2x.png
            sips -z 256 256   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_256x256.png
            sips -z 512 512   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_256x256@2x.png
            sips -z 512 512   src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_512x512.png
            sips -z 1024 1024 src/Wrkzg.Host/Assets/icon.png --out icon.iconset/icon_512x512@2x.png
            iconutil -c icns icon.iconset -o icon.icns
            rm -rf icon.iconset
          fi

      - name: Create .app Bundle
        run: |
          APP_NAME="Wrkzg.app"
          mkdir -p "$APP_NAME/Contents/MacOS"
          mkdir -p "$APP_NAME/Contents/Resources"

          # Copy all publish output into MacOS/
          cp -R publish/osx-x64/* "$APP_NAME/Contents/MacOS/"

          # Copy Info.plist
          cp src/Wrkzg.Host/macOS/Info.plist "$APP_NAME/Contents/"

          # Copy icon (icns format)
          if [ -f icon.icns ]; then
            cp icon.icns "$APP_NAME/Contents/Resources/icon.icns"
          fi

          # Make binary executable
          chmod +x "$APP_NAME/Contents/MacOS/Wrkzg"

          # Ad-hoc code sign (no Apple Developer account needed)
          codesign --force --deep --sign - "$APP_NAME"

          # Create ZIP preserving the .app structure
          zip -r -y Wrkzg-${{ github.ref_name }}-osx-x64.zip "$APP_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: osx-x64
          path: Wrkzg-${{ github.ref_name }}-osx-x64.zip

  # ─── Create GitHub Release ──────────────────────────────
  create-release:
    needs: [build-windows, build-macos-arm64, build-macos-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate Checksums
        run: sha256sum *.zip > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Wrkzg ${{ github.ref_name }}

            Self-hosted Twitch community bot with built-in dashboard.

            ### Downloads

            | Platform | File |
            |---|---|
            | Windows x64 | `Wrkzg-${{ github.ref_name }}-win-x64.zip` |
            | macOS Apple Silicon | `Wrkzg-${{ github.ref_name }}-osx-arm64.zip` |
            | macOS Intel | `Wrkzg-${{ github.ref_name }}-osx-x64.zip` |

            ### Installation

            **Windows:**
            1. Download and extract the ZIP
            2. Run `Wrkzg.exe`

            **macOS:**
            1. Download and extract the ZIP
            2. Double-click `Wrkzg.app`
            3. On first launch: Right-click → Open → Open (required for unsigned apps)

            The Setup Wizard will guide you through connecting your Twitch account.

            ### Verify Downloads

            Check `checksums-sha256.txt` to verify file integrity.
          files: |
            *.zip
            checksums-sha256.txt
