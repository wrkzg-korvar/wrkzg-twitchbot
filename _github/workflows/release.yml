name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish Windows
        run: |
          dotnet publish src/TwitchBot.Host/TwitchBot.Host.csproj `
            -c Release -r win-x64 --self-contained `
            -o publish/win-x64
      - name: Create ZIP
        run: Compress-Archive publish/win-x64/* TwitchBot-${{ github.ref_name }}-win-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: TwitchBot-${{ github.ref_name }}-win-x64.zip

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish macOS ARM64
        run: |
          dotnet publish src/TwitchBot.Host/TwitchBot.Host.csproj \
            -c Release -r osx-arm64 --self-contained \
            -o publish/osx-arm64
      - name: Create ZIP
        run: zip -r TwitchBot-${{ github.ref_name }}-osx-arm64.zip publish/osx-arm64/
      - uses: actions/upload-artifact@v4
        with:
          name: osx-arm64
          path: TwitchBot-${{ github.ref_name }}-osx-arm64.zip

  create-release:
    needs: [build-windows, build-macos-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate Checksums
        run: |
          sha256sum **/*.zip > checksums.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
            checksums.txt
          generate_release_notes: true
